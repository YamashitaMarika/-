<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ENTRY | TOPページ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="サイトヘッダー">
      <a class="logo" href="index.html#hero" aria-label="TOPへ戻る">Brand</a>
      <nav class="global-nav" aria-label="グローバルナビゲーション">
        <a href="index.html#features">特徴</a>
        <a href="index.html#service">サービス</a>
        <a href="entry.html" aria-current="page">ENTRY</a>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Entry Form</p>
        <h1>エントリーフォーム</h1>
        <p class="hero__lead">以下の項目をご入力のうえ、送信してください。担当者より折り返しご連絡します。</p>
      </section>

      <section class="section form-section" aria-label="エントリーフォーム">
        <form class="entry-form" action="#" method="post">
          <div class="form-grid">
            <label class="form-field">
              <span>お名前 <strong>必須</strong></span>
              <input type="text" name="name" autocomplete="name" required />
            </label>

            <label class="form-field">
              <span>メールアドレス <strong>必須</strong></span>
              <input type="email" name="email" autocomplete="email" required />
            </label>

            <label class="form-field">
              <span>電話番号</span>
              <input type="tel" name="tel" autocomplete="tel" />
            </label>

            <label class="form-field">
              <span>希望職種 <strong>必須</strong></span>
              <select name="position" required>
                <option value="">選択してください</option>
                <option value="designer">デザイナー</option>
                <option value="engineer">エンジニア</option>
                <option value="director">ディレクター</option>
                <option value="other">その他</option>
              </select>
            </label>
          </div>

          <label class="form-field form-field--full">
            <span>志望動機・自己PR <strong>必須</strong></span>
            <textarea name="message" rows="7" required></textarea>
          </label>

          <label class="checkbox-field">
            <input type="checkbox" name="privacy" required />
            <span>個人情報の取り扱いに同意します。</span>
          </label>

          <div class="form-actions">
            <button class="button button--primary" type="submit">送信する</button>
            <a class="button button--secondary" href="index.html">TOPへ戻る</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
